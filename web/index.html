<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoonSEO MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-lang="zh">
    <main class="shell">
      <section class="workspace">
        <section class="panel draft-panel">
          <div id="previewPanel" class="draft-scroll"></div>
        </section>

        <aside class="panel audit-panel">
          <div class="audit-actions">
            <div class="audit-toolbar">
              <button id="exportButton" type="button">导出 HTML</button>
              <details class="settings-menu">
                <summary id="settingsSummary">Settings</summary>
                <div class="lang-switch" aria-label="language switch">
                  <button id="langZhButton" type="button" data-lang-switch="zh" class="lang-pill active">中文</button>
                  <button id="langEnButton" type="button" data-lang-switch="en" class="lang-pill">EN</button>
                </div>
              </details>
            </div>
            <p id="exportHint" class="export-hint"></p>
            <p id="auditScoreLabel" class="audit-score-label">审计分</p>
          </div>

          <div class="audit-scroll">
            <div id="scorePanel"></div>
            <div id="auditPanel"></div>
          </div>
        </aside>
      </section>

      <details id="briefDrawer" class="brief-drawer">
        <summary>
          <span id="briefSummaryTitle">Brief 与约束设置</span>
          <span id="briefSummaryNote" class="summary-note">展开 / 收起</span>
        </summary>

        <div class="brief-body">
          <p id="briefIntro" class="brief-intro">
            填写品牌名、关键词、受众和已批准事实，页面会实时更新。
          </p>

          <div class="brief-grid">
            <label class="field">
              <span id="brandLabel">品牌名称</span>
              <input id="brandName" type="text" value="MoonSEO" />
            </label>

            <label class="field">
              <span id="keywordLabel">主关键词</span>
              <input id="primaryKeyword" type="text" value="seo content audit" />
            </label>

            <label class="field">
              <span id="audienceLabel">目标受众</span>
              <input id="audience" type="text" value="growth marketers" />
            </label>

            <label class="field field-wide">
              <span id="websiteLabel">品牌官网</span>
              <input id="websiteUrl" type="url" value="https://moonseo.ai" />
            </label>
          </div>
        </div>
      </details>

      <section class="composer-bar">
        <div class="composer-shell">
          <div class="source-toolbar">
            <div class="source-actions">
              <button id="uploadButton" type="button" class="upload-button secondary">上传资料</button>
              <input
                id="sourceUpload"
                type="file"
                accept=".txt,.md,.pdf,.doc,.docx"
                multiple
                hidden
              />
              <p id="uploadCaption" class="upload-caption">支持 fact sheet、PDF、DOC、DOCX、TXT、MD</p>
            </div>
            <div id="sourceStatus" class="source-status">未上传资料，当前使用示例事实。</div>
          </div>

          <div id="sourceList" class="source-list"></div>
          <textarea id="sourceFacts" hidden>Runs in the browser for faster review
Shows evidence anchors beside key claims
Exports static HTML for lightweight publishing</textarea>

          <label class="field field-wide composer-field">
            <span id="notesLabel">补充说明</span>
            <textarea id="notesInput" rows="2"></textarea>
          </label>

          <div class="composer-actions">
            <button id="generateButton" type="button" class="send-button secondary" aria-label="生成草稿" title="生成草稿">↑</button>
          </div>
        </div>
      </section>
    </main>

    <script src="../_build/js/debug/build/cmd/web/web.js"></script>
  </body>
</html>
